<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0a0a0a">
    <title>Page introuvable — AiDN Agency</title>
    <meta name="description" content="Cette page n'existe pas ou a été déplacée.">
    <link rel="canonical" href="https://www.aidnagency.fr/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: clip; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.6;
        }
        .wrap {
            max-width: 640px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .glow::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(234, 88, 12, 0.25) 0%, rgba(234, 88, 12, 0.08) 40%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.4; }
        }
        .tag {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(234, 88, 12, 0.15);
            color: #ea580c;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 24px;
        }
        h1 {
            font-size: clamp(72px, 15vw, 140px);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.04em;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #fafafa 0%, #737373 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: clamp(24px, 4vw, 32px);
            font-weight: 600;
            margin-bottom: 16px;
        }
        p {
            color: #a3a3a3;
            font-size: 16px;
            margin-bottom: 40px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ea580c;
            color: white;
            padding: 16px 32px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s, background 0.2s;
        }
        .cta:hover { background: #c2410c; transform: scale(1.02); }
        .cta:focus-visible { outline: 3px solid white; outline-offset: 3px; }
        @media (max-width: 480px) {
            p { font-size: 14px; }
            .cta { padding: 14px 24px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="glow" aria-hidden="true"></div>
    <main class="wrap">
        <span class="tag">Erreur 404</span>
        <h1>404</h1>
        <h2>Cette page n'existe pas.</h2>
        <p>L'URL que vous cherchez a peut-être été déplacée, supprimée, ou n'a jamais existé. Retournons à l'essentiel.</p>
        <a href="/" class="cta">
            Retour à l'accueil
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
    </main>
</body>
</html>
