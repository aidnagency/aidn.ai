<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0E0E0E">
    <title>Page introuvable — AiDN Agency</title>
    <meta name="description" content="Cette page n'existe pas ou a été déplacée.">
    <link rel="canonical" href="https://www.aidnagency.fr/">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0E0E0E;
            --paper: #F2EFE8;
            --orange: #FF5B0C;
            --acid: #D4FF3A;
            --muted: #8A8680;
            --sans: 'Inter', ui-sans-serif, system-ui;
            --serif: 'Instrument Serif', ui-serif, Georgia;
            --mono: 'JetBrains Mono', ui-monospace, monospace;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        *::selection { background: var(--acid); color: var(--ink); }
        html, body { overflow-x: clip; }
        body {
            font-family: var(--sans);
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
        .grain {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 10;
            opacity: 0.08;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.8'/></svg>");
        }
        .nav {
            position: fixed;
            top: 20px; left: 32px; right: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 20;
        }
        .nav-logo {
            font-family: var(--serif);
            font-style: italic;
            font-size: 26px;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--ink);
        }
        .nav-logo b {
            font-family: var(--sans);
            font-style: normal;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        .back {
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            color: var(--ink);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border: 1px solid var(--ink);
            border-radius: 100px;
            transition: all 0.3s var(--ease);
        }
        .back:hover { background: var(--ink); color: var(--paper); }

        .bg-num {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            font-family: var(--serif);
            font-style: italic;
            font-size: clamp(320px, 60vw, 900px);
            color: var(--acid);
            opacity: 0.42;
            pointer-events: none;
            z-index: 1;
            line-height: 0.75;
            letter-spacing: -0.05em;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) rotate(-3deg); }
            50% { transform: translate(-50%, -52%) rotate(3deg); }
        }

        .wrap {
            max-width: 720px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .label {
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 32px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .label::before {
            content: '';
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--orange);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 50% { opacity: 0.3; } }

        h1 {
            font-family: var(--sans);
            font-weight: 500;
            font-size: clamp(40px, 7vw, 88px);
            line-height: 0.95;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }
        h1 .serif {
            font-family: var(--serif);
            font-style: italic;
            font-weight: 400;
        }
        p {
            font-size: 17px;
            color: var(--muted);
            max-width: 480px;
            margin: 0 auto 40px;
            line-height: 1.5;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 28px;
            background: var(--ink);
            color: var(--paper);
            border-radius: 100px;
            font-family: var(--mono);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all 0.4s var(--ease);
        }
        .cta:hover { background: var(--orange); transform: translateY(-2px); }
        .cta .arrow {
            width: 30px; height: 30px;
            background: var(--paper);
            color: var(--ink);
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 14px;
            transition: transform 0.4s var(--ease), background 0.4s var(--ease);
        }
        .cta:hover .arrow { transform: rotate(-45deg); background: var(--acid); }

        @media (max-width: 600px) {
            .nav { left: 20px; right: 20px; top: 16px; }
            .nav-logo { font-size: 22px; }
            .back { padding: 8px 12px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="bg-num" aria-hidden="true">404</div>

    <nav class="nav">
        <a href="/" class="nav-logo"><b>aidn</b>/studio</a>
        <a href="/" class="back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Accueil
        </a>
    </nav>

    <div class="wrap">
        <div class="label">Page introuvable</div>
        <h1>Cette page n'existe <span class="serif">pas</span><br>ou a été <span class="serif">déplacée</span>.</h1>
        <p>Pas de panique. L'image que vous cherchiez n'est peut-être pas encore créée — ou elle est partie ailleurs.</p>
        <a href="/" class="cta">
            <span>Retour à l'accueil</span>
            <span class="arrow">→</span>
        </a>
    </div>
</body>
</html>
